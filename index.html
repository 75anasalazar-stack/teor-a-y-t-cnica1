<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Mental - Bibliografía</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  h1 { text-align:center; color:#fff; padding:28px 20px 6px; font-size:1.8rem; letter-spacing:2px; text-shadow:0 0 20px rgba(120,100,255,.8); }
  .sub { text-align:center; color:rgba(255,255,255,.5); font-size:.85rem; margin-bottom:20px; }
  svg { overflow:visible; display:block; margin:0 auto; }
  .pulse ellipse { animation: glow 2.5s infinite; }
  @keyframes glow { 0%,100%{filter:drop-shadow(0 0 10px #7c3aed)} 50%{filter:drop-shadow(0 0 25px #a78bfa)} }
  .branch { cursor:pointer; transition:transform .2s; }
  .branch:hover { transform-origin:center; }
  .tooltip { position:fixed; background:rgba(10,8,30,.95); border:1px solid rgba(255,255,255,.2); border-radius:10px; padding:9px 13px; color:#fff; font-size:.78rem; pointer-events:none; opacity:0; transition:opacity .2s; max-width:210px; z-index:100; }
  .legend { display:flex; justify-content:center; gap:18px; flex-wrap:wrap; padding:14px 20px 28px; }
  .li { display:flex; align-items:center; gap:7px; color:rgba(255,255,255,.7); font-size:.78rem; }
  .ld { width:13px; height:13px; border-radius:3px; }
</style>
</head>
<body>

<!-- ======= BRANCH 1 ======= -->

  <text x="77" y="394" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.8)">Analítica · Catalográfica</text>

  <rect x="5" y="428" width="145" height="36" rx="8" fill="#1e3a8a" stroke="#93c5fd" stroke-width="1.5"/>

  <rect x="5" y="663" width="145" height="36" rx="8" fill="#064e3b" stroke="#6ee7b7" stroke-width="1.5"/>

</g>

<!-- ======= BRANCH 3 ======= -->
<g class="branch" id="b3n" data-tip="Una buena bibliografía debe ser precisa, exhaustiva, sin repeticiones, bien organizada y con sentido crítico del bibliógrafo.">

  <text x="860" y="576" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.7)">Bibliográficas</text>
</g>
<!-- B4 leaves -->

  <rect x="955" y="462" width="140" height="36" rx="8" fill="#701a40" stroke="#fb7185" stroke-width="1.5"/>
  <text x="1025" y="477" text-anchor="middle" font-size="9.5" fill="white">📘 Descriptiva</text>
  <text x="1025" y="490" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.8)">Características físicas</text>

  <rect x="955" y="537" width="140" height="36" rx="8" fill="#701a40" stroke="#fb7185" stroke-width="1.5"/>

<div class="legend">
  <div class="li"><div class="ld" style="background:#1d4ed8"></div>Corriente Anglosajona</div>
  <div class="li"><div class="ld" style="background:#065f46"></div>Corriente Europeo-Continental</div>
  <div class="li"><div class="ld" style="background:#92400e"></div>Postulados Generales</div>
  <div class="li"><div class="ld" style="background:#831843"></div>Tipologías Bibliográficas</div>
</div>

<div class="tooltip" id="tip"></div>

<script>
  const branches = ['b1n','b2n','b3n','b4n'];
  const state = {};
  branches.forEach(id => {
    state[id] = true;
    const el = document.getElementById(id);
    el.addEventListener('mouseenter', e => {
      const tip = document.getElementById('tip');
      tip.textContent = el.dataset.tip;
      tip.style.opacity = '1';
    });
    el.addEventListener('mousemove', e => {
      const tip = document.getElementById('tip');
      tip.style.left = (e.clientX+15)+'px';
      tip.style.top = (e.clientY-10)+'px';
    });
    el.addEventListener('mouseleave', () => {
      document.getElementById('tip').style.opacity = '0';
    });
    el.addEventListener('click', () => {
      const lId = id.replace('n','l');
      const leaves = document.getElementById(lId);
      if (!leaves) return;
      state[id] = !state[id];
      leaves.style.opacity = state[id] ? '1' : '0.15';
      leaves.style.transition = 'opacity 0.3s';
    });
  });
</script>
</body>
</html>
